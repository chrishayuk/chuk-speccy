name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      # The native window head pulls in cpal (ALSA), winit (xkbcommon) and rfd (GTK/glib).
      # Their dev libraries are Linux-only; macOS/Windows use the system frameworks.
      - name: system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgtk-3-dev libxkbcommon-dev libudev-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lint every target (lib, bins, tests, examples) — warnings fail the build.
      # `--all-features` so the SDK's `compile` flow (the rustz80 game layer, pulled from
      # the cell80 repo) is linted/tested.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      # The non-gated suite. ROM-backed and network tests are `#[ignore]` (they need
      # SPECTRUM_ROM / the network), so they're skipped here by design.
      - name: test
        run: cargo test --workspace --all-features
